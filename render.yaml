services:
  - type: web
    name: disaster-tweet-verifier
    runtime: python
    plan: free
    region: oregon
    buildCommand: "pip install -r requirements.txt && python train.py"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
